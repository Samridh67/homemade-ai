<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>your's companion</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
      background: 
        linear-gradient(135deg, rgba(15, 23, 42, 0.92), rgba(30, 41, 59, 0.88)),
        url('https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?w=1920&q=80');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #e2e8f0;
    }

    .container {
      width: min(720px, 100%);
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
      font-weight: 700;
      text-align: center;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      margin: 0 0 28px;
      color: #94a3b8;
      text-align: center;
      font-size: 0.95rem;
    }

    .chat-area {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    textarea {
      width: 100%;
      min-height: 100px;
      background: rgba(30, 41, 59, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      color: #f1f5f9;
      padding: 16px;
      resize: vertical;
      font-size: 1rem;
      line-height: 1.6;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    textarea:focus {
      outline: none;
      border-color: rgba(139, 92, 246, 0.5);
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15);
    }

    textarea::placeholder {
      color: #64748b;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 14px 28px;
      font-size: 1rem;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg, #8b5cf6, #6366f1);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(139, 92, 246, 0.4);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status {
      flex: 1;
      color: #a78bfa;
      font-size: 0.9rem;
      min-width: 200px;
    }

    .output {
      min-height: 180px;
      max-height: 400px;
      overflow-y: auto;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      padding: 20px;
      white-space: pre-wrap;
      font-size: 1rem;
      line-height: 1.7;
      color: #cbd5e1;
    }

    .output::-webkit-scrollbar {
      width: 8px;
    }

    .output::-webkit-scrollbar-track {
      background: transparent;
    }

    .output::-webkit-scrollbar-thumb {
      background: rgba(139, 92, 246, 0.3);
      border-radius: 4px;
    }

    .loading-dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }

    @keyframes dots {
      0%, 20% { content: ''; }
      40% { content: '.'; }
      60% { content: '..'; }
      80%, 100% { content: '...'; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>test module prortotype 23</h1>
    <p class="subtitle">Runs entirely in your browser — no server, no signup</p>

    <div class="chat-area">
      <textarea id="prompt" placeholder="Ask me anything... (Enter to send, Shift+Enter for new line)"></textarea>
      
      <div class="controls">
        <button id="askBtn">Ask AI</button>
        <div id="status" class="status">Initializing...</div>
      </div>
      
      <div id="output" class="output">Your answer will appear here.</div>
    </div>
  </div>

  <script type="module">
    import { pipeline, TextStreamer } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2/dist/transformers.min.js';

    const promptEl = document.getElementById('prompt');
    const askBtn = document.getElementById('askBtn');
    const statusEl = document.getElementById('status');
    const outputEl = document.getElementById('output');

    let generator = null;

    async function initModel() {
      statusEl.innerHTML = '<span class="loading-dots">Loading model (first time may take a minute)</span>';
      askBtn.disabled = true;

      try {
        generator = await pipeline('text-generation', 'Xenova/Qwen2.5-0.5B-Instruct', {
          progress_callback: (progress) => {
            if (progress.status === 'downloading') {
              const pct = progress.progress ? Math.round(progress.progress) : 0;
              statusEl.textContent = `Downloading: ${pct}%`;
            }
          }
        });

        statusEl.textContent = '✓ Ready — ask away!';
        askBtn.disabled = false;
        promptEl.focus();
      } catch (err) {
        statusEl.textContent = '✗ Failed to load model';
        outputEl.textContent = `Error: ${err.message}\n\nTry refreshing or using Chrome/Edge.`;
      }
    }

    async function askAI() {
      const userPrompt = promptEl.value.trim();
      if (!userPrompt || !generator) return;

      askBtn.disabled = true;
      statusEl.innerHTML = '<span class="loading-dots">Thinking</span>';
      outputEl.textContent = '';

      try {
        const messages = [
          { role: 'system', content: 'You are a helpful assistant.' },
          { role: 'user', content: userPrompt }
        ];

        const tokenizer = generator.tokenizer;
        const prompt = tokenizer.apply_chat_template(messages, {
          tokenize: false,
          add_generation_prompt: true
        });

        const streamer = new TextStreamer(tokenizer, {
          skip_prompt: true,
          on_chunk: (text) => {
            const cleanText = text.replace(/<\|im_end\|>|<\|im_start\|>\w*/g, '');
            outputEl.textContent += cleanText;
            outputEl.scrollTop = outputEl.scrollHeight;
          }
        });

        await generator(prompt, {
          max_new_tokens: 220,
          do_sample: true,
          temperature: 0.8,
          top_p: 0.95,
          repetition_penalty: 1.05,
          streamer
        });

        statusEl.textContent = '✓ Done';
      } catch (err) {
        statusEl.textContent = '✗ Generation failed';
        outputEl.textContent = `Error: ${err.message}`;
      } finally {
        askBtn.disabled = false;
      }
    }

    askBtn.addEventListener('click', askAI);

    promptEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        askAI();
      }
    });

    initModel();
  </script>
</body>
</html>
