<body>
  <div class="container">
    <h1>✨ AI Chat</h1>
    <p class="subtitle">Runs entirely in your browser — no server, no signup</p>

    <div class="chat-area">
      <textarea id="prompt" placeholder="Ask me anything... (Enter to send, Shift+Enter for new line)"></textarea>

      <div class="controls">
        <button id="askBtn">Ask AI</button>
        <div id="status" class="status">Initializing...</div>
      </div>

      <div id="output" class="output">Your answer will appear here.</div>
    </div>
  </div>

  <script type="module">
    // Fix 1: use the actively maintained package (v3), not the deprecated @xenova one.
    import { pipeline, TextStreamer } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0';

    const promptEl = document.getElementById('prompt');
    const askBtn = document.getElementById('askBtn');
    const statusEl = document.getElementById('status');
    const outputEl = document.getElementById('output');

    let generator = null;

    async function initModel() {
      statusEl.innerHTML = '<span class="loading-dots">Loading model (first time may take a minute)</span>';
      askBtn.disabled = true;

      try {
        const useWebGPU = !!navigator.gpu;
        statusEl.textContent = useWebGPU
          ? 'Loading model (WebGPU detected — fast path)...'
          : 'Loading model (no WebGPU — will use CPU, slower)...';

        generator = await pipeline('text-generation', 'onnx-community/Qwen2.5-0.5B-Instruct', {
          dtype: 'q4',
          device: useWebGPU ? 'webgpu' : 'wasm',
          progress_callback: (progress) => {
            // v3's progress event uses status 'progress' (not 'downloading'),
            // and progress.progress is already a 0-100 number.
            if (progress.status === 'initiate') {
              statusEl.textContent = `Starting download: ${progress.file || ''}`;
            } else if (progress.status === 'progress') {
              const pct = Math.round(progress.progress ?? 0);
              statusEl.textContent = `Downloading ${progress.file || 'model'}: ${pct}%`;
            } else if (progress.status === 'done') {
              statusEl.textContent = `Finished: ${progress.file || ''}`;
            }
          }
        });
        statusEl.textContent = '✓ Ready — ask away!';
        askBtn.disabled = false;
        promptEl.focus();
      } catch (err) {
        statusEl.textContent = '✗ Failed to load model';
        outputEl.textContent = `Error: ${err.message}\n\nTry refreshing or using Chrome/Edge.`;
      }
    }

    async function askAI() {
      const userPrompt = promptEl.value.trim();
      if (!userPrompt || !generator) return;

      askBtn.disabled = true;
      const startTime = Date.now();
      let timerInterval = setInterval(() => {
        const secs = Math.round((Date.now() - startTime) / 1000);
        statusEl.textContent = `Thinking… (${secs}s — this can take up to a minute on CPU)`;
      }, 500);
      outputEl.textContent = '';

      try {
        const messages = [
          { role: 'user', content: userPrompt }
        ];

        // Fix 2: the option is `callback_function`, not `on_chunk`.
        // With the wrong name, transformers.js silently ignores it,
        // so generation runs but nothing ever gets written to the page.
        const streamer = new TextStreamer(generator.tokenizer, {
          skip_prompt: true,
          skip_special_tokens: true,
          callback_function: (text) => {
            clearInterval(timerInterval);
            statusEl.textContent = '✓ Streaming response…';
            outputEl.textContent += text;
            outputEl.scrollTop = outputEl.scrollHeight;
          }
        });

        await generator(messages, {
          max_new_tokens: 150,
          do_sample: true,
          temperature: 0.7,
          top_p: 0.9,
          repetition_penalty: 1.1,
          streamer: streamer
        });

        clearInterval(timerInterval);
        statusEl.textContent = '✓ Done';
      } catch (err) {
        clearInterval(timerInterval);
        statusEl.textContent = '✗ Generation failed';
        outputEl.textContent = `Error: ${err.message}`;
      } finally {
        askBtn.disabled = false;
      }
    }

    askBtn.addEventListener('click', askAI);

    promptEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        askAI();
      }
    });

    initModel();
  </script>
</body>
